<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設計模板</title>
    <style>
        /* ========================================
           1. CSS 重置 & 基礎設定
        ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ========================================
           2. 設計系統變數 (Design Tokens)
        ======================================== */
        :root {
            /* 主色系 */
            --primary: #5CAB32;
            --primary-dark: #4a9428;
            --primary-light: #7FBD4F;
            --primary-pale: #E8F4DC;
            --primary-accent: #3d7f1f;
            
            /* 背景色階 */
            --bg-page: #F5F9F2;
            --bg-container: #ffffff;
            --bg-content: #FAFCF8;
            
            /* 文字色 */
            --text-primary: #333333;
            --text-secondary: #666666;
            --text-muted: #999999;
            
            /* 陰影 */
            --shadow-sm: 0 2px 8px rgba(92, 171, 50, 0.06);
            --shadow-md: 0 4px 16px rgba(92, 171, 50, 0.10);
            --shadow-lg: 0 8px 32px rgba(92, 171, 50, 0.12);
            
            /* 圓角 */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-pill: 25px;
            --radius-circle: 50%;
            
            /* 間距 */
            --space-xs: 8px;
            --space-sm: 12px;
            --space-md: 20px;
            --space-lg: 40px;
            
            /* 過渡動畫 */
            --transition: all 0.3s ease;
        }

        /* ========================================
           3. 頁面背景
        ======================================== */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-page);
            min-height: 100vh;
            padding: var(--space-md);
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* 背景裝飾圖案 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0%25" y1="0%25" x2="100%25" y2="100%25"><stop offset="0%25" style="stop-color:%235CAB32;stop-opacity:0.05"/><stop offset="100%25" style="stop-color:%234a9428;stop-opacity:0.05"/></linearGradient></defs><circle cx="100" cy="100" r="100" fill="url(%23g)"/></svg>');
            background-size: 300px 300px;
            opacity: 0.3;
            pointer-events: none;
            z-index: -1;
        }

        /* ========================================
           4. 主容器
        ======================================== */
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--bg-container);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }

        /* ========================================
           5. Header 區塊 (精簡版)
        ======================================== */
        .header {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary-pale) 100%);
            color: var(--primary-dark);
            padding: var(--space-md) var(--space-md);
            position: relative;
            overflow: hidden;
        }

        /* Header 光暈裝飾 */
        .header::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: var(--radius-circle);
            pointer-events: none;
            top: -60%;
            right: -5%;
        }

        .header-content {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: var(--space-md);
        }

        /* Logo 左側 */
        .header-logo {
            width: 50px;
            height: 50px;
            background: var(--bg-container);
            border-radius: var(--radius-circle);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-sm);
            animation: float 3s ease-in-out infinite;
            font-size: 24px;
            flex-shrink: 0;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .header-text {
            flex: 1;
        }

        .header h1 {
            font-size: 1.4em;
            color: var(--primary-dark);
            margin-bottom: 2px;
        }

        .header p {
            font-size: 0.9em;
            color: var(--primary-accent);
        }

        /* 右上角按鈕 */
        .header-actions {
            display: flex;
            gap: var(--space-xs);
        }

        .header-btn {
            background: var(--bg-container);
            border: none;
            color: var(--primary-dark);
            padding: 8px 16px;
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }

        .header-btn:hover {
            background: var(--primary-pale);
        }

        .header-btn.active {
            background: var(--primary-light);
            color: white;
        }

        /* ========================================
           6. 內容區塊
        ======================================== */
        .content {
            padding: var(--space-lg);
            background: var(--bg-content);
        }

        /* ========================================
           7. 按鈕系統
        ======================================== */
        .btn {
            display: inline-block;
            padding: var(--space-sm) var(--space-md);
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            color: white;
            box-shadow: var(--shadow-md);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary {
            background: var(--primary-light);
            color: white;
        }
        .btn-secondary:hover {
            background: var(--primary);
            transform: translateY(-2px);
        }

        .btn-option {
            background: var(--bg-content);
            color: var(--primary-dark);
            border: 2px solid var(--primary-pale);
        }
        .btn-option:hover {
            background: var(--primary-pale);
            border-color: var(--primary-light);
        }
        .btn-option.active {
            background: var(--primary-light);
            color: white;
            border-color: var(--primary-light);
        }

        .btn-group {
            display: flex;
            gap: var(--space-xs);
            flex-wrap: wrap;
        }

        /* ========================================
           8. Footer 區塊
        ======================================== */
        .footer {
            background: linear-gradient(135deg, var(--primary-pale) 0%, var(--bg-content) 100%);
            padding: var(--space-md);
            text-align: center;
            color: var(--primary-accent);
            font-size: 13px;
            border-top: 2px solid var(--primary-pale);
        }

        /* ========================================
           9. 工具類別
        ======================================== */
        .text-center { text-align: center; }
        .text-muted { color: var(--text-muted); }
        .mt-md { margin-top: var(--space-md); }
        .mb-md { margin-bottom: var(--space-md); }

        /* ========================================
           10. RWD 響應式
        ======================================== */
        @media (max-width: 768px) {
            .header h1 { font-size: 1.2em; }
            .header p { font-size: 0.8em; }
            .content { padding: var(--space-md); }
            .header-actions { 
                position: absolute;
                top: var(--space-sm);
                right: var(--space-sm);
            }
            .header-content {
                padding-right: 80px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="header-logo">🌿</div>
                <div class="header-text">
                    <h1>設計模板標題</h1>
                    <p>這是副標題描述文字</p>
                </div>
                <div class="header-actions">
                    <button class="header-btn active">EN</button>
                    <button class="header-btn">中</button>
                </div>
            </div>
        </header>

        <!-- Content -->
        <main class="content">

            <p>內容區塊</p>

            <div class="btn-group mt-md">
                <button class="btn btn-primary">主要按鈕</button>
                <button class="btn btn-secondary">次要按鈕</button>
                <button class="btn btn-option">選項按鈕</button>
            </div>

        </main>

        <!-- Footer -->
        <footer class="footer">
            © 2025 設計模板 | Design Template
        </footer>

    </div>

</body>
</html>
