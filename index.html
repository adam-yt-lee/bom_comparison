<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM Comparison Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        /* ========================================
           1. CSS 重置 & 基礎設定
        ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ========================================
           2. 設計系統變數 (Design Tokens)
        ======================================== */
        :root {
            /* 主色系 */
            --primary: #5CAB32;
            --primary-dark: #4a9428;
            --primary-light: #7FBD4F;
            --primary-pale: #E8F4DC;
            --primary-accent: #3d7f1f;

            /* 背景色階 */
            --bg-page: #F5F9F2;
            --bg-container: #ffffff;
            --bg-content: #FAFCF8;

            /* 文字色 */
            --text-primary: #333333;
            --text-secondary: #666666;
            --text-muted: #999999;

            /* 狀態色 */
            --color-positive: #2e7d32;
            --color-negative: #c62828;

            /* 陰影 */
            --shadow-sm: 0 2px 8px rgba(92, 171, 50, 0.06);
            --shadow-md: 0 4px 16px rgba(92, 171, 50, 0.10);
            --shadow-lg: 0 8px 32px rgba(92, 171, 50, 0.12);

            /* 圓角 */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-pill: 25px;
            --radius-circle: 50%;

            /* 間距 */
            --space-xs: 8px;
            --space-sm: 12px;
            --space-md: 20px;
            --space-lg: 40px;

            /* 過渡動畫 */
            --transition: all 0.3s ease;
        }

        /* ========================================
           3. 頁面背景
        ======================================== */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-page);
            min-height: 100vh;
            padding: var(--space-md);
            color: var(--text-primary);
            line-height: 1.6;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0%25" y1="0%25" x2="100%25" y2="100%25"><stop offset="0%25" style="stop-color:%235CAB32;stop-opacity:0.05"/><stop offset="100%25" style="stop-color:%234a9428;stop-opacity:0.05"/></linearGradient></defs><circle cx="100" cy="100" r="100" fill="url(%23g)"/></svg>');
            background-size: 300px 300px;
            opacity: 0.3;
            pointer-events: none;
            z-index: -1;
        }

        /* ========================================
           4. 主容器
        ======================================== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--bg-container);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }

        /* ========================================
           5. Header 區塊
        ======================================== */
        .header {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary-pale) 100%);
            color: var(--primary-dark);
            padding: var(--space-md) var(--space-md);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: var(--radius-circle);
            pointer-events: none;
            top: -60%;
            right: -5%;
        }

        .header-content {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: var(--space-md);
        }

        .header-logo {
            width: 50px;
            height: 50px;
            background: var(--bg-container);
            border-radius: var(--radius-circle);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-sm);
            animation: float 3s ease-in-out infinite;
            font-size: 24px;
            flex-shrink: 0;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .header-text { flex: 1; }

        .header h1 {
            font-size: 1.4em;
            color: var(--primary-dark);
            margin-bottom: 2px;
        }

        .header p {
            font-size: 0.9em;
            color: var(--primary-accent);
        }

        .header-actions {
            display: flex;
            gap: var(--space-xs);
        }

        .header-btn {
            background: var(--bg-container);
            border: none;
            color: var(--primary-dark);
            padding: 8px 16px;
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }

        .header-btn:hover { background: var(--primary-pale); }
        .header-btn.active { background: var(--primary-light); color: white; }

        /* ========================================
           6. 內容區塊
        ======================================== */
        .content {
            padding: var(--space-lg);
            background: var(--bg-content);
        }

        /* ========================================
           7. 按鈕系統
        ======================================== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: var(--space-sm) var(--space-md);
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            color: white;
            box-shadow: var(--shadow-md);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: var(--primary-light);
            color: white;
        }
        .btn-secondary:hover {
            background: var(--primary);
            transform: translateY(-2px);
        }

        .btn-option {
            background: var(--bg-content);
            color: var(--primary-dark);
            border: 2px solid var(--primary-pale);
        }
        .btn-option:hover {
            background: var(--primary-pale);
            border-color: var(--primary-light);
        }
        .btn-option.active {
            background: var(--primary-light);
            color: white;
            border-color: var(--primary-light);
        }

        .btn-group {
            display: flex;
            gap: var(--space-xs);
            flex-wrap: wrap;
        }

        /* ========================================
           8. 檔案上傳區
        ======================================== */
        .upload-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-md);
            margin-bottom: var(--space-md);
        }

        .upload-box {
            border: 2px dashed var(--primary-pale);
            border-radius: var(--radius-md);
            padding: var(--space-md);
            text-align: center;
            transition: var(--transition);
            cursor: pointer;
            position: relative;
        }

        .upload-box:hover,
        .upload-box.dragover {
            border-color: var(--primary-light);
            background: var(--primary-pale);
        }

        .upload-box.loaded {
            border-color: var(--primary);
            background: var(--primary-pale);
            padding: var(--space-xs) var(--space-sm);
        }

        .upload-box.loaded .upload-icon,
        .upload-box.loaded .upload-hint {
            display: none;
        }

        .upload-box.loaded .upload-label {
            font-size: 12px;
            margin-bottom: 0;
            display: inline;
        }

        .upload-box.loaded .upload-filename {
            display: inline;
            margin-top: 0;
            margin-left: 6px;
        }

        .upload-box input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 36px;
            margin-bottom: var(--space-xs);
        }

        .upload-label {
            font-weight: 600;
            color: var(--primary-dark);
            font-size: 15px;
            margin-bottom: 4px;
        }

        .upload-hint {
            font-size: 12px;
            color: var(--text-muted);
        }

        .upload-filename {
            font-size: 13px;
            color: var(--primary);
            font-weight: 600;
            margin-top: var(--space-xs);
            word-break: break-all;
        }

        /* ========================================
           9. 結果表格
        ======================================== */
        .result-section {
            display: none;
            margin-top: var(--space-md);
        }

        .result-section.visible {
            display: block;
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: var(--space-sm);
            padding-bottom: var(--space-xs);
            border-bottom: 2px solid var(--primary-pale);
        }

        .detail-section {
            margin-bottom: var(--space-md);
        }
        .detail-section-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .detail-section-title .badge {
            font-size: 11px;
            font-weight: 600;
            background: var(--primary-pale);
            color: var(--primary-dark);
            padding: 1px 8px;
            border-radius: 10px;
        }
        .sec-qty .detail-section-title { background: #e3f2fd; color: #1565c0; }
        .sec-price .detail-section-title { background: #fff3e0; color: #e65100; }
        .sec-both .detail-section-title { background: #fce4ec; color: #c62828; }

        .table-wrapper {
            overflow-x: auto;
            border-radius: var(--radius-sm);
            border: 1px solid var(--primary-pale);
            margin-bottom: var(--space-md);
            max-height: 500px;
            overflow-y: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            white-space: nowrap;
        }

        .data-table thead {
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .data-table th {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 10px 14px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
        }

        .data-table td {
            padding: 8px 14px;
            border-bottom: 1px solid #f0f0f0;
        }

        .data-table tbody tr:hover {
            background: var(--primary-pale);
        }

        .data-table tbody tr {
            background: white;
        }
        .data-table tbody tr:nth-child(even) {
            background: #fafff6;
        }
        .data-table tbody tr:hover,
        .data-table tbody tr:nth-child(even):hover {
            background: var(--primary-pale);
        }

        .num-positive { color: var(--color-positive); font-weight: 600; }
        .num-negative { color: var(--color-negative); font-weight: 600; }
        .num-cell { text-align: right; font-variant-numeric: tabular-nums; }

        .data-table tfoot td {
            font-weight: 700;
            border-top: 2px solid var(--primary-light);
            background: var(--primary-pale);
            position: sticky;
            bottom: 0;
            z-index: 1;
        }

        /* Sticky left columns for summary pivot table */
        .data-table .sticky-col {
            position: sticky;
            background: inherit;
            z-index: 1;
        }
        .data-table thead .sticky-col {
            z-index: 3;
        }
        .data-table tfoot .sticky-col {
            z-index: 2;
        }

        /* ========================================
           10. 狀態訊息
        ======================================== */
        .status-bar {
            display: none;
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-sm);
            margin-bottom: var(--space-md);
            font-size: 14px;
            font-weight: 500;
        }
        .status-bar.visible { display: flex; align-items: center; gap: 8px; }
        .status-bar.info { background: #e3f2fd; color: #1565c0; }
        .status-bar.success { background: var(--primary-pale); color: var(--primary-dark); }
        .status-bar.error { background: #ffebee; color: #c62828; }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid currentColor;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* (Tabs removed - both views shown inline) */

        .summary-clickable {
            cursor: pointer;
            transition: background 0.15s;
        }
        .summary-clickable:hover {
            background: var(--primary-pale) !important;
            text-decoration: underline;
        }

        .detail-empty-hint {
            text-align: center;
            padding: var(--space-md);
            color: var(--text-muted);
            font-size: 13px;
        }

        .filter-tags {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .filter-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--primary-pale);
            color: var(--primary-dark);
            border: 1px solid var(--primary-light);
            border-radius: var(--radius-pill);
            padding: 2px 6px 2px 10px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }
        .filter-tag .tag-close {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: var(--primary-dark);
            font-size: 11px;
            cursor: pointer;
            transition: background 0.15s;
            padding: 0;
            line-height: 1;
        }
        .filter-tag .tag-close:hover {
            background: var(--primary-light);
            color: white;
        }

        /* ========================================
           11b. Summary Toolbar
        ======================================== */
        .summary-toolbar {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            margin-bottom: var(--space-xs);
            flex-wrap: wrap;
        }
        .summary-toolbar label {
            font-size: 12px;
            font-weight: 600;
            color: var(--primary-dark);
            white-space: nowrap;
        }
        .summary-toolbar select,
        .summary-toolbar input[type="number"] {
            padding: 3px 8px;
            border: 1px solid var(--primary-pale);
            border-radius: 4px;
            font-size: 12px;
            color: var(--text-primary);
            background: white;
        }
        .summary-toolbar input[type="number"] {
            width: 70px;
            text-align: right;
        }
        .toolbar-left, .toolbar-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .toolbar-right {
            margin-left: auto;
        }
        .toolbar-separator {
            width: 1px;
            height: 16px;
            background: var(--primary-pale);
            margin: 0 4px;
        }

        /* ========================================
           12. Summary 統計
        ======================================== */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: var(--space-xs);
            margin-bottom: var(--space-sm);
        }

        .stat-card {
            background: white;
            border: 1px solid var(--primary-pale);
            border-radius: 6px;
            padding: 4px var(--space-sm);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .stat-value {
            font-size: 15px;
            font-weight: 700;
            color: var(--primary-dark);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* ========================================
           13. Footer 區塊
        ======================================== */
        .footer {
            background: linear-gradient(135deg, var(--primary-pale) 0%, var(--bg-content) 100%);
            padding: var(--space-md);
            text-align: center;
            color: var(--primary-accent);
            font-size: 13px;
            border-top: 2px solid var(--primary-pale);
        }

        /* ========================================
           14. 工具類別
        ======================================== */
        .text-center { text-align: center; }
        .text-muted { color: var(--text-muted); }
        .mt-md { margin-top: var(--space-md); }
        .mb-md { margin-bottom: var(--space-md); }

        /* ========================================
           15. RWD 響應式
        ======================================== */
        @media (max-width: 768px) {
            .header h1 { font-size: 1.2em; }
            .header p { font-size: 0.8em; }
            .content { padding: var(--space-md); }
            .upload-section { grid-template-columns: 1fr; }
            .header-actions {
                position: absolute;
                top: var(--space-sm);
                right: var(--space-sm);
            }
            .header-content { padding-right: 80px; }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="header-logo">📊</div>
                <div class="header-text">
                    <h1 id="title">BOM Comparison Tool</h1>
                    <p id="subtitle">Upload Current & Prior BOM files to compare differences</p>
                </div>
                <div class="header-actions">
                    <button class="header-btn active" onclick="setLang('en')">EN</button>
                    <button class="header-btn" onclick="setLang('zh')">中</button>
                </div>
            </div>
        </header>

        <!-- Content -->
        <main class="content">

            <!-- File Upload -->
            <div class="upload-section">
                <div class="upload-box" id="currentBox">
                    <input type="file" id="currentFile" accept=".xlsx,.xls" onchange="handleFile(this, 'current')">
                    <div class="upload-icon">📁</div>
                    <div class="upload-label" data-i18n="currentBom">Current BOM</div>
                    <div class="upload-hint" data-i18n="uploadHint">Click or drag .xlsx file here</div>
                    <div class="upload-filename" id="currentFileName"></div>
                </div>
                <div class="upload-box" id="priorBox">
                    <input type="file" id="priorFile" accept=".xlsx,.xls" onchange="handleFile(this, 'prior')">
                    <div class="upload-icon">📁</div>
                    <div class="upload-label" data-i18n="priorBom">Prior BOM</div>
                    <div class="upload-hint" data-i18n="uploadHint">Click or drag .xlsx file here</div>
                    <div class="upload-filename" id="priorFileName"></div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="btn-group" style="align-items: center;">
                <button class="btn btn-primary" id="compareBtn" onclick="runComparison()" disabled>
                    <span data-i18n="compare">Compare</span>
                </button>
                <button class="btn btn-option" onclick="downloadTemplate()" style="font-size:11px; padding:4px 10px; margin-left:auto;" title="Download template with required columns">
                    <span data-i18n="downloadTemplate">Template (.xlsx)</span>
                </button>
            </div>

            <!-- Status -->
            <div class="status-bar" id="statusBar">
                <div class="spinner" id="statusSpinner"></div>
                <span id="statusText"></span>
            </div>

            <!-- Results -->
            <div class="result-section" id="resultSection">

                <!-- Stats -->
                <div class="stats-row" id="statsRow"></div>

                <!-- Download Button -->
                <div class="btn-group mb-md" style="justify-content: flex-end;">
                    <button class="btn btn-option" onclick="downloadExcel()" style="font-size:12px; padding:4px 12px;">
                        <span data-i18n="downloadAll">Download (.xlsx)</span>
                    </button>
                </div>

                <!-- Summary Toolbar -->
                <div class="summary-toolbar" id="summaryToolbar" style="display:none;">
                    <div class="toolbar-left">
                        <label for="projectSelect">Project:</label>
                        <select id="projectSelect" onchange="onProjectChange(this.value)">
                            <option value="all">All</option>
                        </select>
                    </div>
                    <div class="toolbar-right">
                        <label>Threshold:</label>
                        <input type="number" id="thresholdPct" value="3" min="0" step="0.1" onchange="onThresholdChange()" title="Change % threshold">
                        <label>%</label>
                        <div class="toolbar-separator"></div>
                        <input type="number" id="thresholdAmt" value="0.01" min="0" step="0.01" onchange="onThresholdChange()" title="Change amount threshold">
                        <label>Amt</label>
                    </div>
                </div>

                <!-- Summary Table -->
                <div class="section-title" data-i18n="summaryTitle">Summary by MtlGroup</div>
                <div class="table-wrapper" id="tableSum" style="max-height:300px;"></div>

                <!-- Detail Table -->
                <div style="margin-top:var(--space-sm);">
                    <div class="section-title" style="display:flex; align-items:center; gap:var(--space-sm);">
                        <span data-i18n="detailTitle">All Changes (Detail)</span>
                        <div id="detailFilterBar" class="filter-tags"></div>
                    </div>
                    <div id="detailContent">
                        <div class="detail-empty-hint" data-i18n="detailHint">Click a value in the summary table to view details</div>
                    </div>
                </div>
            </div>

        </main>

        <!-- Footer -->
        <footer class="footer">
            &copy; 2025 BOM Comparison Tool
        </footer>

    </div>

<script>
// ========================================
// State
// ========================================
let currentData = null;
let priorData = null;
let comparisonResult = null;
let summaryResult = null;
let currentLang = 'en';
let detailFilter = { product: null, mtlGroup: null };
let selectedProject = 'all';
let thresholdPct = 3;
let thresholdAmt = 0.01;

// ========================================
// i18n
// ========================================
const i18n = {
    en: {
        title: 'BOM Comparison Tool',
        subtitle: 'Upload Current & Prior BOM files to compare differences',
        currentBom: 'Current BOM',
        priorBom: 'Prior BOM',
        uploadHint: 'Click or drag .xlsx file here',
        compare: 'Compare',
        downloadAll: 'Download (.xlsx)',
        downloadTemplate: 'Template (.xlsx)',
        detailTitle: 'All Changes (Detail)',
        summaryTitle: 'Summary by MtlGroup',
        processing: 'Processing comparison...',
        done: 'Comparison complete!',
        errorSheet: 'Cannot find "BOM Data" sheet in the file.',
        totalChanges: 'Total Changes',
        totalAmtDiff: 'Total AmtDiff',
        newItems: 'New Items',
        removedItems: 'Removed Items',
        products: 'Products',
        detailHint: 'Click a value in the summary table to view details',
        secQtyDiff: 'Quantity Difference',
        secPriceDiff: 'Price Difference',
        secBothDiff: 'Price & Quantity Difference',
    },
    zh: {
        title: 'BOM 比對工具',
        subtitle: '上傳 Current 與 Prior BOM 檔案進行差異比較',
        currentBom: '本期 BOM (Current)',
        priorBom: '前期 BOM (Prior)',
        uploadHint: '點擊或拖曳 .xlsx 檔案至此',
        compare: '開始比對',
        downloadAll: '下載 (.xlsx)',
        downloadTemplate: '範本 (.xlsx)',
        detailTitle: '所有變動明細',
        summaryTitle: 'MtlGroup 彙總',
        processing: '比對處理中...',
        done: '比對完成！',
        errorSheet: '檔案中找不到 "BOM Data" 工作表。',
        totalChanges: '變動項目數',
        totalAmtDiff: '金額差異合計',
        newItems: '新增項目',
        removedItems: '移除項目',
        products: '產品數',

        secPriceDiff: '價格差異',
        secBothDiff: '價格與數量差異',
    }
};

function t(key) { return i18n[currentLang][key] || key; }

function setLang(lang) {
    currentLang = lang;
    document.querySelectorAll('.header-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('title').textContent = t('title');
    document.getElementById('subtitle').textContent = t('subtitle');
    document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = t(el.dataset.i18n);
    });
    // Re-render tables if results exist
    if (comparisonResult) {
        summaryResult = buildSummary(getFilteredComparison());
        renderStats();
        renderSummaryTable();
    }
}

// ========================================
// Project Filter
// ========================================
function getFilteredComparison() {
    let rows = comparisonResult;
    if (selectedProject !== 'all') {
        rows = rows.filter(r => r.Project === selectedProject);
    }
    // Threshold filter on detail rows: hide where BOTH |Change%| <= pct AND |AmtDiff| <= amt
    if (thresholdPct > 0 || thresholdAmt > 0) {
        rows = rows.filter(r => {
            const absAmt = Math.abs(r.AmtDiff);
            const priorCost = r['Prior_Unit Cost'] || 0;
            const absPct = priorCost === 0 ? Infinity : Math.abs((r['Curr_Unit Cost'] - priorCost) / priorCost) * 100;
            return !(absPct <= thresholdPct && absAmt <= thresholdAmt);
        });
    }
    return rows;
}

function applyFilters() {
    const filtered = getFilteredComparison();
    summaryResult = buildSummary(filtered);
    renderStats();
    renderSummaryTable();
    detailFilter = { product: null, mtlGroup: null };
    resetDetailToEmpty();
}

function onProjectChange(val) {
    selectedProject = val;
    applyFilters();
}

function onThresholdChange() {
    thresholdPct = parseFloat(document.getElementById('thresholdPct').value) || 0;
    thresholdAmt = parseFloat(document.getElementById('thresholdAmt').value) || 0;
    applyFilters();
}

function populateProjectDropdown() {
    const projects = [...new Set(comparisonResult.map(r => r.Project))].sort();
    const sel = document.getElementById('projectSelect');
    sel.innerHTML = '';
    if (projects.length === 1) {
        sel.innerHTML = `<option value="${projects[0]}">${projects[0]}</option>`;
        selectedProject = projects[0];
    } else {
        sel.innerHTML = '<option value="all">All</option>' +
            projects.map(p => `<option value="${p}">${p}</option>`).join('');
        selectedProject = 'all';
    }
    document.getElementById('summaryToolbar').style.display = 'flex';
}

// ========================================
// File Handling
// ========================================
function handleFile(input, type) {
    const file = input.files[0];
    if (!file) return;

    const box = document.getElementById(type === 'current' ? 'currentBox' : 'priorBox');
    const nameEl = document.getElementById(type === 'current' ? 'currentFileName' : 'priorFileName');

    const reader = new FileReader();
    reader.onload = function(e) {
        const workbook = XLSX.read(e.target.result, { type: 'array' });
        const sheetName = workbook.SheetNames.find(n => n === 'BOM Data') || workbook.SheetNames[0];
        const sheet = workbook.Sheets[sheetName];
        const json = XLSX.utils.sheet_to_json(sheet, { defval: null });

        if (type === 'current') {
            currentData = json;
        } else {
            priorData = json;
        }

        box.classList.add('loaded');
        nameEl.textContent = file.name + ' (' + json.length + ' rows)';
        checkReady();
    };
    reader.readAsArrayBuffer(file);
}

// Drag & drop
document.querySelectorAll('.upload-box').forEach(box => {
    box.addEventListener('dragover', e => { e.preventDefault(); box.classList.add('dragover'); });
    box.addEventListener('dragleave', () => box.classList.remove('dragover'));
    box.addEventListener('drop', e => {
        e.preventDefault();
        box.classList.remove('dragover');
        const input = box.querySelector('input[type="file"]');
        input.files = e.dataTransfer.files;
        input.dispatchEvent(new Event('change'));
    });
});

function checkReady() {
    document.getElementById('compareBtn').disabled = !(currentData && priorData);
}

// ========================================
// BOM Processing (mirrors M code logic)
// ========================================
function processBOM(rawData, prefix) {
    // prefix: 'Curr' or 'Old'
    const qtyField = prefix + '_Qty';
    const priceField = prefix + '_Price';

    // Rename Price(USD) -> Unit Cost if needed
    const rows = rawData.map(row => {
        const r = { ...row };
        if (r['Price(USD)'] !== undefined && r['Unit Cost'] === undefined) {
            r['Unit Cost'] = r['Price(USD)'];
        }
        if (!r['Project']) r['Project'] = 'Project';
        return r;
    });

    // Filter dummy (Unit Cost = 0 or null)
    const filtered = rows.filter(r => {
        const uc = parseFloat(r['Unit Cost']);
        return uc && uc !== 0;
    });

    // Group by Compare_Key
    const groups = {};
    for (const row of filtered) {
        const key = String(row['Project'] || '') + '|' + String(row['Product'] || '') + '|' + String(row['Material'] || '');
        if (!groups[key]) {
            groups[key] = {
                Compare_Key: key,
                Project: row['Project'] || '',
                Product: row['Product'] || '',
                MtlGroup: row['MtlGroup'] || '',
                Material: row['Material'] || '',
                'Desc/Spec': row['Desc/Spec'] || '',
                _qty: [],
                _price: []
            };
        }
        groups[key]._qty.push(parseFloat(row['Ttl. Usage']) || 0);
        groups[key]._price.push(parseFloat(row['Unit Cost']) || 0);
    }

    // Aggregate
    const result = Object.values(groups).map(g => {
        const obj = {
            Compare_Key: g.Compare_Key,
            Project: g.Project,
            Product: g.Product,
            MtlGroup: g.MtlGroup,
            Material: g.Material,
            'Desc/Spec': g['Desc/Spec'],
        };
        obj[qtyField] = g._qty.reduce((a, b) => a + b, 0);
        obj[priceField] = g._price.reduce((a, b) => a + b, 0) / g._price.length;
        return obj;
    });

    return result;
}

function fullOuterJoin(currentBOM, priorBOM) {
    const currentMap = {};
    for (const row of currentBOM) currentMap[row.Compare_Key] = row;

    const priorMap = {};
    for (const row of priorBOM) priorMap[row.Compare_Key] = row;

    const allKeys = new Set([...Object.keys(currentMap), ...Object.keys(priorMap)]);
    const joined = [];

    for (const key of allKeys) {
        const curr = currentMap[key] || null;
        const prior = priorMap[key] || null;

        const currPrice = curr ? (curr.Curr_Price ?? 0) : 0;
        const oldPrice = prior ? (prior.Old_Price ?? 0) : 0;
        const currQty = curr ? (curr.Curr_Qty ?? 0) : 0;
        const oldQty = prior ? (prior.Old_Qty ?? 0) : 0;

        // Filter: Key mismatch OR price/qty difference
        if (!curr || !prior || currPrice !== oldPrice || currQty !== oldQty) {
            const currMtlGroup = curr ? curr.MtlGroup : null;
            const priorMtlGroup = prior ? prior.MtlGroup : null;
            let finalMtlGroup;
            if (!priorMtlGroup) finalMtlGroup = currMtlGroup;
            else if (!currMtlGroup) finalMtlGroup = priorMtlGroup;
            else if (priorMtlGroup === currMtlGroup) finalMtlGroup = currMtlGroup;
            else finalMtlGroup = String(priorMtlGroup) + '/' + String(currMtlGroup);

            joined.push({
                Project: (curr?.Project) ?? (prior?.Project) ?? '',
                Product: (curr?.Product) ?? (prior?.Product) ?? '',
                MtlGroup: finalMtlGroup || '',
                Material: (curr?.Material) ?? (prior?.Material) ?? '',
                'Desc/Spec': (curr?.['Desc/Spec']) ?? (prior?.['Desc/Spec']) ?? '',
                'Prior_Unit Cost': oldPrice,
                'Curr_Unit Cost': currPrice,
                'Prior_Ttl. Usage': oldQty,
                'Curr_Ttl. Usage': currQty,
                AmtDiff: (currPrice * currQty) - (oldPrice * oldQty),
                _isNew: !prior,
                _isRemoved: !curr,
            });
        }
    }

    // Sort by MtlGroup, Material
    joined.sort((a, b) => {
        const mg = String(a.MtlGroup).localeCompare(String(b.MtlGroup));
        if (mg !== 0) return mg;
        return String(a.Material).localeCompare(String(b.Material));
    });

    return joined;
}

function buildSummary(comparison) {
    const groups = {};
    for (const row of comparison) {
        const key = row.Project + '|' + row.Product + '|' + row.MtlGroup;
        if (!groups[key]) {
            groups[key] = {
                Project: row.Project,
                Product: row.Product,
                MtlGroup: row.MtlGroup,
                AmtDiff: 0
            };
        }
        groups[key].AmtDiff += row.AmtDiff;
    }

    // Pivot by Product
    const products = [...new Set(Object.values(groups).map(g => String(g.Product)))].sort();
    const mtlGroups = {};

    for (const g of Object.values(groups)) {
        const mk = g.Project + '|' + g.MtlGroup;
        if (!mtlGroups[mk]) {
            mtlGroups[mk] = { Project: g.Project, MtlGroup: g.MtlGroup };
        }
        mtlGroups[mk][g.Product] = (mtlGroups[mk][g.Product] || 0) + g.AmtDiff;
    }

    const result = Object.values(mtlGroups).sort((a, b) =>
        String(a.MtlGroup).localeCompare(String(b.MtlGroup))
    );

    return { data: result, products };
}

// ========================================
// Main Comparison
// ========================================
function runComparison() {
    showStatus(t('processing'), 'info');
    document.getElementById('resultSection').classList.remove('visible');

    // Use setTimeout to allow UI update
    setTimeout(() => {
        try {
            const currentBOM = processBOM(currentData, 'Curr');
            const priorBOM = processBOM(priorData, 'Old');
            comparisonResult = fullOuterJoin(currentBOM, priorBOM);
            populateProjectDropdown();
            applyFilters();

            document.getElementById('resultSection').classList.add('visible');
            showStatus(t('done') + ' — ' + comparisonResult.length + ' changes found', 'success');
        } catch (err) {
            showStatus('Error: ' + err.message, 'error');
            console.error(err);
        }
    }, 50);
}

// ========================================
// Rendering
// ========================================
function renderStats() {
    const filtered = getFilteredComparison();
    const totalAmtDiff = filtered.reduce((s, r) => s + r.AmtDiff, 0);
    const newItems = filtered.filter(r => r._isNew).length;
    const removedItems = filtered.filter(r => r._isRemoved).length;
    const products = [...new Set(filtered.map(r => r.Product))].length;

    const fmtAmt = totalAmtDiff.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const amtClass = totalAmtDiff >= 0 ? 'num-positive' : 'num-negative';

    document.getElementById('statsRow').innerHTML = `
        <div class="stat-card">
            <div class="stat-label">${t('totalChanges')}</div>
            <div class="stat-value">${filtered.length}</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">${t('totalAmtDiff')}</div>
            <div class="stat-value ${amtClass}">${fmtAmt}</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">${t('newItems')}</div>
            <div class="stat-value">${newItems}</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">${t('removedItems')}</div>
            <div class="stat-value">${removedItems}</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">${t('products')}</div>
            <div class="stat-value">${products}</div>
        </div>
    `;
}

function fmtNum(v, decimals = 2) {
    if (v == null || isNaN(v)) return '';
    return Number(v).toLocaleString(undefined, { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function numClass(v) {
    if (v > 0) return 'num-cell num-positive';
    if (v < 0) return 'num-cell num-negative';
    return 'num-cell';
}

// ========================================
// Filter State & Tags
// ========================================
function setFilter(key, value) {
    detailFilter[key] = value;
    renderDetailFromFilter();
}

function removeFilter(key) {
    detailFilter[key] = null;
    if (!detailFilter.product && !detailFilter.mtlGroup) {
        resetDetailToEmpty();
    } else {
        renderDetailFromFilter();
    }
}

function clearAllFilters() {
    detailFilter = { product: null, mtlGroup: null };
    resetDetailToEmpty();
}

function resetDetailToEmpty() {
    document.getElementById('detailContent').innerHTML =
        `<div class="detail-empty-hint" data-i18n="detailHint">${t('detailHint')}</div>`;
    renderFilterTags();
}

function renderFilterTags() {
    const bar = document.getElementById('detailFilterBar');
    const hasFilter = detailFilter.product || detailFilter.mtlGroup;
    if (!hasFilter) { bar.innerHTML = ''; return; }

    let html = `<button class="btn btn-option" style="font-size:11px; padding:2px 8px;" onclick="clearAllFilters()">✕</button>`;
    if (detailFilter.product) {
        html += `<span class="filter-tag">Product: ${detailFilter.product}<button class="tag-close" onclick="removeFilter('product')">✕</button></span>`;
    }
    if (detailFilter.mtlGroup) {
        html += `<span class="filter-tag">MtlGroup: ${detailFilter.mtlGroup}<button class="tag-close" onclick="removeFilter('mtlGroup')">✕</button></span>`;
    }
    bar.innerHTML = html;
}

function renderDetailFromFilter() {
    const fp = detailFilter.product;
    const fm = detailFilter.mtlGroup;
    const hasFilter = fp || fm;

    const isMtlGroupOnly = fm && !fp;
    const showProject = selectedProject === 'all';
    const allCols = isMtlGroupOnly
        ? [...(showProject ? ['Project'] : []), 'Products', 'Material', 'Desc/Spec',
           'Prior_Unit Cost', 'Curr_Unit Cost', 'Change%', 'Prior_Ttl. Usage', 'Curr_Ttl. Usage', 'AmtDiff']
        : [...(showProject ? ['Project'] : []), 'Product', 'MtlGroup', 'Material', 'Desc/Spec',
           'Prior_Unit Cost', 'Curr_Unit Cost', 'Change%', 'Prior_Ttl. Usage', 'Curr_Ttl. Usage', 'AmtDiff'];
    // Hide columns that are active filters
    const hideCols = new Set();
    if (fp) hideCols.add('Product');
    if (fm) hideCols.add('MtlGroup');
    const cols = allCols.filter(c => !hideCols.has(c));
    const numCols = new Set(['Prior_Unit Cost', 'Curr_Unit Cost', 'Change%', 'Prior_Ttl. Usage', 'Curr_Ttl. Usage', 'AmtDiff']);
    const mergeCols = cols.filter(c => ['Project', 'Product', 'MtlGroup'].includes(c));

    // Filter rows (threshold already applied in getFilteredComparison)
    let rows = getFilteredComparison().filter(r => {
        if (fp && r.Product !== fp) return false;
        if (fm && r.MtlGroup !== fm) return false;
        return true;
    });

    // Compute Change% for each row
    for (const r of rows) {
        const prior = r['Prior_Unit Cost'] || 0;
        r['Change%'] = prior === 0 ? (r['Curr_Unit Cost'] ? Infinity : 0)
            : ((r['Curr_Unit Cost'] - prior) / Math.abs(prior)) * 100;
    }

    // Dedup when filtering by MtlGroup only (no product): collapse rows with same Material + same Usage
    // Keep Project as-is, merge Product (textjoin with newline)
    if (fm && !fp) {
        const groups = {};
        const order = [];
        for (const r of rows) {
            const key = r.Material + '|' + r['Prior_Unit Cost'] + '|' + r['Curr_Unit Cost']
                      + '|' + r['Prior_Ttl. Usage'] + '|' + r['Curr_Ttl. Usage'];
            if (!groups[key]) {
                groups[key] = { ...r, _products: new Set() };
                order.push(key);
            }
            if (r.Product) groups[key]._products.add(r.Product);
        }
        rows = order.map(k => {
            const g = groups[k];
            g._affectedProducts = [...g._products].join('\n');
            return g;
        });
    }

    // Pre-compute rowspans for merge columns
    const spans = {};
    for (const mc of mergeCols) {
        spans[mc] = new Array(rows.length).fill(1);
        const skip = new Set();
        for (let i = 0; i < rows.length; i++) {
            if (skip.has(i)) { spans[mc][i] = 0; continue; }
            let count = 1;
            while (i + count < rows.length && rows[i + count][mc] === rows[i][mc]) {
                skip.add(i + count);
                count++;
            }
            spans[mc][i] = count;
        }
    }

    // Classify rows into 3 categories
    const qtyRows = [];   // price same, qty different
    const priceRows = []; // qty same, price different
    const bothRows = [];  // both different
    for (const r of rows) {
        const priceSame = (r['Prior_Unit Cost'] || 0) === (r['Curr_Unit Cost'] || 0);
        const qtySame = (r['Prior_Ttl. Usage'] || 0) === (r['Curr_Ttl. Usage'] || 0);
        if (priceSame && !qtySame) qtyRows.push(r);
        else if (!priceSame && qtySame) priceRows.push(r);
        else bothRows.push(r);
    }

    // Helper: compute extra diff columns per category
    for (const r of qtyRows) {
        r._QtyDiff = (r['Curr_Ttl. Usage'] || 0) - (r['Prior_Ttl. Usage'] || 0);
    }
    for (const r of priceRows) {
        r._PriceDiff = (r['Curr_Unit Cost'] || 0) - (r['Prior_Unit Cost'] || 0);
    }
    for (const r of bothRows) {
        r._QtyDiff = (r['Curr_Ttl. Usage'] || 0) - (r['Prior_Ttl. Usage'] || 0);
        r._PriceDiff = (r['Curr_Unit Cost'] || 0) - (r['Prior_Unit Cost'] || 0);
    }

    // Build sub-table HTML
    function buildSubTable(secRows, secCols, secNumCols, secMergeCols, extraCols) {
        // Pre-compute rowspans for merge columns
        const sp = {};
        for (const mc of secMergeCols) {
            sp[mc] = new Array(secRows.length).fill(1);
            const sk = new Set();
            for (let i = 0; i < secRows.length; i++) {
                if (sk.has(i)) { sp[mc][i] = 0; continue; }
                let count = 1;
                while (i + count < secRows.length && secRows[i + count][mc] === secRows[i][mc]) {
                    sk.add(i + count);
                    count++;
                }
                sp[mc][i] = count;
            }
        }

        let h = '<div class="table-wrapper"><table class="data-table"><thead><tr>';
        for (const c of secCols) h += `<th>${c}</th>`;
        h += '</tr></thead><tbody>';

        for (let i = 0; i < secRows.length; i++) {
            const row = secRows[i];
            h += '<tr>';
            for (const c of secCols) {
                if (secMergeCols.includes(c)) {
                    if (sp[c][i] === 0) continue;
                    const rs = sp[c][i] > 1 ? ` rowspan="${sp[c][i]}" style="vertical-align:top;"` : '';
                    const val = String(row[c] ?? '').replace(/\n/g, '<br>');
                    h += `<td${rs} style="white-space:pre-line;vertical-align:top;">${val}</td>`;
                } else if (c === 'Products') {
                    const val = String(row._affectedProducts ?? '').replace(/\n/g, '<br>');
                    h += `<td style="white-space:pre-line;font-size:11px;color:var(--text-secondary);">${val}</td>`;
                } else if (c === 'Change%') {
                    const v = row[c] ?? 0;
                    const display = isFinite(v) ? fmtNum(v) + '%' : 'NEW';
                    const tip = isFinite(v) ? fmtNum(v, 5) + '%' : 'NEW';
                    h += `<td class="${numClass(v)}" title="${tip}">${display}</td>`;
                } else if (extraCols[c]) {
                    const v = row[extraCols[c]] ?? 0;
                    h += `<td class="${numClass(v)}" title="${fmtNum(v, 5)}">${fmtNum(v)}</td>`;
                } else if (secNumCols.has(c)) {
                    const v = row[c] ?? 0;
                    h += `<td class="${numClass(c === 'AmtDiff' ? v : 0)}" title="${fmtNum(v, 5)}">${fmtNum(v)}</td>`;
                } else {
                    h += `<td>${row[c] ?? ''}</td>`;
                }
            }
            h += '</tr>';
        }

        // Total row
        const totalKeys = ['AmtDiff'];
        const tots = {};
        for (const c of totalKeys) tots[c] = secRows.reduce((s, r) => s + (r[c] ?? 0), 0);
        const nonNum = secCols.filter(c => !secNumCols.has(c) && !extraCols[c] && c !== 'Products').length + (secCols.includes('Products') ? 1 : 0);
        h += '</tbody><tfoot><tr>';
        h += `<td colspan="${nonNum}" style="text-align:left;">Total</td>`;
        for (const c of secCols) {
            if (!secNumCols.has(c) && !extraCols[c]) continue;
            if (c === 'AmtDiff') {
                const v = tots[c];
                h += `<td class="${numClass(v)}" title="${fmtNum(v, 5)}">${fmtNum(v)}</td>`;
            } else {
                h += '<td></td>';
            }
        }
        h += '</tr></tfoot></table></div>';
        return h;
    }

    // Define columns per section
    // qtyRows: hide price cols, show QtyDiff
    const qtyOnlyCols = cols.filter(c => c !== 'Prior_Unit Cost' && c !== 'Curr_Unit Cost' && c !== 'Change%');
    // Insert QtyDiff before AmtDiff
    const qtyIdx = qtyOnlyCols.indexOf('AmtDiff');
    if (qtyIdx >= 0) qtyOnlyCols.splice(qtyIdx, 0, 'QtyDiff');
    const qtyNumCols = new Set([...numCols, 'QtyDiff']);

    // priceRows: hide qty cols, show PriceDiff
    const priceOnlyCols = cols.filter(c => c !== 'Prior_Ttl. Usage' && c !== 'Curr_Ttl. Usage');
    const priceIdx = priceOnlyCols.indexOf('AmtDiff');
    if (priceIdx >= 0) priceOnlyCols.splice(priceIdx, 0, 'PriceDiff');
    const priceNumCols = new Set([...numCols, 'PriceDiff']);

    // bothRows: show all + QtyDiff + PriceDiff
    const bothCols = [...cols];
    const bothIdx = bothCols.indexOf('AmtDiff');
    if (bothIdx >= 0) { bothCols.splice(bothIdx, 0, 'QtyDiff'); bothCols.splice(bothIdx + 1, 0, 'PriceDiff'); }
    const bothNumCols = new Set([...numCols, 'QtyDiff', 'PriceDiff']);

    let html = '';

    const sections = [
        { key: 'secQtyDiff',   css: 'sec-qty',   rows: qtyRows,   secCols: qtyOnlyCols,   secNumCols: qtyNumCols,   extra: { 'QtyDiff': '_QtyDiff' } },
        { key: 'secPriceDiff', css: 'sec-price',  rows: priceRows, secCols: priceOnlyCols, secNumCols: priceNumCols, extra: { 'PriceDiff': '_PriceDiff' } },
        { key: 'secBothDiff',  css: 'sec-both',   rows: bothRows,  secCols: bothCols,      secNumCols: bothNumCols,  extra: { 'QtyDiff': '_QtyDiff', 'PriceDiff': '_PriceDiff' } },
    ];

    for (const sec of sections) {
        if (sec.rows.length === 0) continue;
        html += `<div class="detail-section ${sec.css}">`;
        html += `<div class="detail-section-title">${t(sec.key)} <span class="badge">${sec.rows.length}</span></div>`;
        html += buildSubTable(sec.rows, sec.secCols, sec.secNumCols, mergeCols, sec.extra);
        html += '</div>';
    }

    if (html === '') {
        html = `<div style="text-align:center;padding:20px;color:var(--text-secondary);">No detail rows to display.</div>`;
    }

    document.getElementById('detailContent').innerHTML = html;
    renderFilterTags();
    document.getElementById('detailContent').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function drillDown(product, mtlGroup) {
    detailFilter = { product: product, mtlGroup: mtlGroup };
    renderDetailFromFilter();
}

function drillDownProduct(product) {
    detailFilter = { product: product, mtlGroup: null };
    renderDetailFromFilter();
}

function drillDownMtlGroup(mtlGroup) {
    detailFilter = { product: null, mtlGroup: mtlGroup };
    renderDetailFromFilter();
}

function renderSummaryTable() {
    const { data, products } = summaryResult;
    const showProject = selectedProject === 'all';
    const baseCols = showProject ? ['Project', 'MtlGroup'] : ['MtlGroup'];

    // Compute rowspans for Project column
    const projectSpans = new Array(data.length).fill(1);
    if (showProject) {
        const skip = new Set();
        for (let i = 0; i < data.length; i++) {
            if (skip.has(i)) { projectSpans[i] = 0; continue; }
            let count = 1;
            while (i + count < data.length && data[i + count].Project === data[i].Project) {
                skip.add(i + count);
                count++;
            }
            projectSpans[i] = count;
        }
    }

    // Compute sticky left offsets
    const colWidths = showProject ? [100, 120] : [120]; // estimated px widths
    const stickyOffsets = [];
    let offset = 0;
    for (let ci = 0; ci < baseCols.length; ci++) {
        stickyOffsets.push(offset);
        offset += colWidths[ci];
    }

    let html = '<table class="data-table"><thead><tr>';
    for (let ci = 0; ci < baseCols.length; ci++) {
        html += `<th class="sticky-col" style="left:${stickyOffsets[ci]}px;">${baseCols[ci]}</th>`;
    }
    for (const p of products) html += `<th>${p}</th>`;
    html += '</tr></thead><tbody>';

    for (let i = 0; i < data.length; i++) {
        const row = data[i];
        html += '<tr>';
        if (showProject && projectSpans[i] > 0) {
            const rs = projectSpans[i] > 1 ? ` rowspan="${projectSpans[i]}"` : '';
            html += `<td class="sticky-col" style="left:${stickyOffsets[0]}px;vertical-align:top;"${rs}>${row.Project ?? ''}</td>`;
        }
        const escaped_mg = String(row.MtlGroup ?? '').replace(/'/g, "\\'");
        const mgLeft = stickyOffsets[showProject ? 1 : 0];
        html += `<td class="sticky-col summary-clickable" style="left:${mgLeft}px;" onclick="drillDownMtlGroup('${escaped_mg}')">${row.MtlGroup ?? ''}</td>`;
        for (const p of products) {
            const v = row[p] ?? 0;
            const escaped_p = String(p).replace(/'/g, "\\'");
            html += `<td class="${numClass(v)} summary-clickable" onclick="drillDown('${escaped_p}','${escaped_mg}')" title="${fmtNum(v, 5)}">${fmtNum(v)}</td>`;
        }
        html += '</tr>';
    }

    // Total row
    html += '</tbody><tfoot><tr>';
    html += `<td class="sticky-col" colspan="${baseCols.length}" style="left:0;text-align:left;">Total</td>`;
    for (const p of products) {
        const total = data.reduce((s, r) => s + (r[p] ?? 0), 0);
        const escaped_p = String(p).replace(/'/g, "\\'");
        html += `<td class="${numClass(total)} summary-clickable" onclick="drillDownProduct('${escaped_p}')" title="${fmtNum(total, 5)}">${fmtNum(total)}</td>`;
    }
    html += '</tr></tfoot></table>';
    document.getElementById('tableSum').innerHTML = html;
}

// ========================================
// Template Download
// ========================================
function downloadTemplate() {
    const templateCols = ['Project', 'Product', 'MtlGroup', 'Material', 'Desc/Spec', 'Unit Cost', 'Ttl. Usage'];
    const ws = XLSX.utils.aoa_to_sheet([templateCols]);
    // Set column widths
    ws['!cols'] = templateCols.map(c => ({ wch: Math.max(c.length + 2, 12) }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'BOM Data');
    XLSX.writeFile(wb, 'BOM_Template.xlsx');
}

// ========================================
// Download Excel
// ========================================
function downloadExcel() {
    if (!comparisonResult) return;

    // Always use original unfiltered data
    const fullSummary = buildSummary(comparisonResult);
    const { data, products } = fullSummary;

    // Sheet 1: Summary
    const sumData = data.map(r => {
        const obj = { 'Project': r.Project, 'MtlGroup': r.MtlGroup };
        for (const p of products) obj[p] = r[p] ?? 0;
        return obj;
    });
    const wsSummary = XLSX.utils.json_to_sheet(sumData);

    // Sheet 2: Detail
    const detailData = comparisonResult.map(r => {
        const prior = r['Prior_Unit Cost'] || 0;
        const changePct = prior === 0 ? (r['Curr_Unit Cost'] ? Infinity : 0)
            : ((r['Curr_Unit Cost'] - prior) / Math.abs(prior)) * 100;
        return {
            'Project': r.Project,
            'Product': r.Product,
            'MtlGroup': r.MtlGroup,
            'Material': r.Material,
            'Desc/Spec': r['Desc/Spec'],
            'Prior_Unit Cost': r['Prior_Unit Cost'],
            'Curr_Unit Cost': r['Curr_Unit Cost'],
            'Change%': isFinite(changePct) ? changePct : null,
            'Prior_Ttl. Usage': r['Prior_Ttl. Usage'],
            'Curr_Ttl. Usage': r['Curr_Ttl. Usage'],
            'AmtDiff': r.AmtDiff
        };
    });
    const wsDetail = XLSX.utils.json_to_sheet(detailData);

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, wsSummary, 'Summary');
    XLSX.utils.book_append_sheet(wb, wsDetail, 'Detail');
    XLSX.writeFile(wb, 'BOM_Comparison.xlsx');
}
